<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>摇个品牌名</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;300;400;500;600&family=Noto+Sans+SC:wght@200;300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap');
:root{--bg:#F6F4F0;--card:#FFF;--text:#2C2825;--sub:#7A7168;--muted:#B5ADA3;--line:#E6E1DA;--accent:#C8612B;--accent-soft:rgba(200,97,43,.08)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);font-family:'Noto Sans SC',sans-serif;color:var(--text);min-height:100vh;overflow-x:hidden}
.header{text-align:center;padding:56px 24px 32px}
.header h1{font-family:'Noto Serif SC',serif;font-weight:300;font-size:28px;letter-spacing:6px;text-indent:6px;margin-bottom:10px}
.header p{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px}
.steps{display:flex;justify-content:center;gap:32px;padding:0 24px 32px}
.step{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);transition:color .3s}
.step.active{color:var(--text)}
.step-num{width:20px;height:20px;border-radius:50%;border:1px solid var(--muted);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;transition:all .3s}
.step.active .step-num{background:var(--text);color:var(--bg);border-color:var(--text)}
.style-section{padding:0 20px 24px;max-width:780px;margin:0 auto}
.style-section-title{font-size:12px;color:var(--sub);margin-bottom:16px;padding-left:4px;font-weight:400}
.style-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.style-card{aspect-ratio:1.05;border:1.5px solid var(--line);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:all .25s;padding:8px 4px;position:relative}
.style-card:hover{border-color:var(--sub)}
.style-card.selected{border-color:var(--text);background:var(--text)}
.style-card .style-icon{font-size:20px;transition:all .25s;line-height:1}
.style-card.selected .style-icon{filter:grayscale(1) brightness(2)}
.style-card .style-name{font-size:11px;font-weight:400;color:var(--text);letter-spacing:1.5px;transition:color .25s;text-align:center}
.style-card.selected .style-name{color:var(--bg)}
.style-card .style-sample{font-family:'DM Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:.5px;transition:color .25s;text-align:center;line-height:1.5}
.style-card.selected .style-sample{color:rgba(246,244,240,.4)}
.style-card .lock-badge{position:absolute;top:6px;right:6px;font-size:12px;opacity:.6}
.style-card.locked-style{opacity:.55}
.style-card.locked-style:hover{opacity:.75}
.cat-section{padding:0 20px 20px;max-width:780px;margin:0 auto}
.cat-row{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.cat-tag{padding:5px 12px;border:1px solid var(--line);background:transparent;font-family:'Noto Sans SC',sans-serif;font-size:11px;font-weight:300;color:var(--sub);cursor:pointer;transition:all .2s}
.cat-tag.active{border-color:var(--text);color:var(--text);background:rgba(44,40,37,.04)}
.cat-tag:hover:not(.active){border-color:var(--sub)}
.control-row{display:flex;justify-content:center;align-items:center;gap:24px;padding:8px 20px 28px;flex-wrap:wrap}
.control-group{display:flex;align-items:center;gap:8px}
.control-label{font-size:11px;color:var(--sub);font-weight:400}
.len-btn{padding:0 14px;height:32px;border:1px solid var(--line);background:transparent;font-family:'DM Mono',monospace;font-size:12px;color:var(--sub);cursor:pointer;transition:all .2s}
.len-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.toggle-wrap{display:flex;align-items:center;gap:10px}
.toggle-label{font-size:11px;color:var(--muted);transition:color .2s;cursor:pointer;user-select:none}
.toggle-label.active{color:var(--text);font-weight:400}
.toggle-track{width:44px;height:24px;background:var(--line);border-radius:12px;position:relative;cursor:pointer;transition:background .3s}
.toggle-track.on{background:var(--text)}
.toggle-knob{width:18px;height:18px;background:var(--card);border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.toggle-track.on .toggle-knob{transform:translateX(20px)}
.mode-hint{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.5px;text-align:center;padding:0 20px 16px}
.slot-wrapper{display:flex;flex-direction:column;align-items:center;padding:0 20px 20px}
.slot-area{display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap;justify-content:center}
.slot{width:72px;height:92px;background:var(--card);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;user-select:none;transition:all .25s;overflow:hidden;flex-shrink:0}
.slot .slot-char{font-family:'Noto Serif SC',serif;font-weight:400;font-size:36px;color:var(--text);transition:transform .15s}
.slot .lock-dot{position:absolute;top:6px;right:6px;width:5px;height:5px;border-radius:50%;background:transparent;transition:all .2s}
.slot.locked{border-color:var(--accent);background:var(--accent-soft)}
.slot.locked .lock-dot{background:var(--accent)}
.slot:hover:not(.locked){border-color:var(--sub)}
.slot-hint{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:28px}
.shake-btn{width:180px;height:48px;background:var(--text);border:none;color:var(--bg);font-family:'Noto Serif SC',serif;font-weight:300;font-size:18px;letter-spacing:12px;text-indent:12px;cursor:pointer;transition:all .15s;margin-bottom:10px}
.shake-btn:hover{opacity:.85}
.shake-btn:active{transform:scale(.96)}
.key-hint{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:12px}
.free-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:24px;text-align:center}
.save-btn{padding:8px 32px;border:1px solid var(--line);background:transparent;font-size:13px;color:var(--sub);cursor:pointer;transition:all .2s;margin-bottom:40px}
.save-btn:hover{border-color:var(--sub);color:var(--text)}
.saved-section{max-width:780px;margin:0 auto;padding:0 20px 32px}
.saved-bar{display:flex;justify-content:space-between;align-items:center;padding-bottom:12px;border-bottom:1px solid var(--line);margin-bottom:16px}
.saved-bar h3{font-size:12px;font-weight:400;color:var(--sub);letter-spacing:2px}
.saved-actions{display:flex;gap:12px}
.saved-action-btn{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:1px;transition:color .2s}
.saved-action-btn:hover{color:var(--accent)}
.saved-list{display:flex;flex-wrap:wrap;gap:8px}
.saved-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border:1px solid var(--line);animation:popIn .25s ease-out;transition:all .2s}
.saved-item:hover{border-color:var(--sub)}
.saved-item .saved-word{font-family:'Noto Serif SC',serif;font-weight:400;font-size:18px;letter-spacing:3px;color:var(--text)}
.saved-item .saved-style-tag{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:1px;padding:2px 6px;background:var(--bg)}
.saved-item .remove-x{font-size:14px;color:var(--muted);cursor:pointer;line-height:1;padding:0 2px;transition:color .2s}
.saved-item .remove-x:hover{color:var(--accent)}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
.empty-hint{text-align:center;font-size:12px;color:var(--muted);padding:32px 0;font-weight:300}
/* ── UNLOCK SECTION ── */
.unlock-section{max-width:780px;margin:0 auto 40px;padding:0 20px}
.unlock-bar{background:linear-gradient(135deg,#2C2825,#4A4340);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:opacity .2s}
.unlock-bar:hover{opacity:.9}
.unlock-bar-text{color:#C4B5A0;font-size:13px;letter-spacing:1px}
.unlock-bar-price{color:var(--bg);font-size:18px;font-weight:500}












.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-size:12px;padding:10px 24px;opacity:0;transition:all .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:600px){.style-grid{grid-template-columns:repeat(3,1fr);gap:8px}.slot{width:56px;height:74px}.slot .slot-char{font-size:28px}.steps{gap:16px}.step span{display:none}.control-row{gap:12px}}
@media(max-width:380px){.style-grid{grid-template-columns:repeat(2,1fr);gap:8px}.slot{width:48px;height:66px}.slot .slot-char{font-size:24px}}

.code-panel{background:#3A3632;overflow:hidden;transition:max-height .4s ease,padding .4s ease;max-height:0;padding:0 24px}
.code-panel.open{max-height:300px;padding:24px}
.code-panel-inner{display:flex;flex-direction:column;align-items:center;gap:16px}
.code-step{font-size:13px;color:#C4B5A0;text-align:center;line-height:1.6}
.code-input-row{display:flex;gap:8px;width:100%;max-width:360px}
.code-input{flex:1;height:44px;background:#2C2825;border:1.5px solid rgba(196,181,160,.3);color:#F6F4F0;font-family:'DM Mono',monospace;font-size:14px;padding:0 14px;letter-spacing:1px;outline:none;text-transform:uppercase;transition:border-color .2s}
.code-input:focus{border-color:#C4B5A0}
.code-input::placeholder{color:#6A6360;font-size:12px;letter-spacing:0;text-transform:none}
.code-submit-btn{height:44px;padding:0 24px;background:#C4B5A0;border:none;color:#2C2825;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.code-submit-btn:hover{background:#D4C5B0}
.code-submit-btn:disabled{opacity:.5;cursor:not-allowed}
.code-msg{font-size:12px;min-height:18px;transition:color .2s}
.code-msg.error{color:#E87461}
.code-msg.success{color:#7EBF8E}
</style>
</head>
<body>
<div class="header"><h1>摇个品牌名</h1><p>Brand Name Shaker</p></div>
<div class="steps">
<div class="step active" id="step1"><div class="step-num">1</div><span>选风格</span></div>
<div class="step" id="step2"><div class="step-num">2</div><span>选字库</span></div>
<div class="step" id="step3"><div class="step-num">3</div><span>摇一摇</span></div>
</div>
<div class="style-section"><div class="style-section-title">选一个品牌调性</div><div class="style-grid" id="styleGrid"></div></div>
<div class="cat-section"><div class="cat-row" id="catRow"></div></div>
<div class="control-row">
<div class="control-group"><span class="control-label">字数</span>
<button class="len-btn" data-len="2" onclick="setLen(2)">2</button>
<button class="len-btn active" data-len="3" onclick="setLen(3)">3</button>
<button class="len-btn" data-len="4" onclick="setLen(4)">4</button>
<button class="len-btn" data-len="more" onclick="setLen('more')">更多</button>
</div>
<div class="toggle-wrap">
<span class="toggle-label active" id="labelRandom">随机拼字</span>
<div class="toggle-track" id="logicToggle" onclick="toggleLogic()"><div class="toggle-knob"></div></div>
<span class="toggle-label" id="labelLogic">有意义词</span>
</div>
</div>
<div id="modeHint" class="mode-hint">从字库中随机抽字拼合，可能产生意外惊喜</div>
<div class="slot-wrapper">
<div class="slot-area" id="slotArea"></div>
<div class="slot-hint" id="slotHint">点击单字锁定</div>
<button class="shake-btn" id="shakeBtn" onclick="shake()">摇</button>
<div class="free-hint" id="freeHint"></div>
<button class="save-btn" onclick="saveWord()">收藏这个</button>
</div>
<div class="saved-section">
<div class="saved-bar"><h3>已收藏</h3><div class="saved-actions">
<button class="saved-action-btn" onclick="copyAll()">复制全部</button>
<button class="saved-action-btn" onclick="clearSaved()">清空</button>
</div></div>
<div class="saved-list" id="savedList"></div>
</div>
<!-- UNLOCK SECTION -->
<div class="unlock-section" id="unlockSection">
<div class="unlock-bar" onclick="toggleCodePanel()">
<span class="unlock-bar-text">解锁全部 16 种风格 + 无限次摇</span>
<span class="unlock-bar-price">解锁</span>
</div>
<div class="code-panel" id="codePanel">
<div class="code-panel-inner">
<div class="code-step">在小红书搜索「摇个品牌名」购买兑换码</div>
<div class="code-input-row">
<input id="codeInput" class="code-input" type="text" placeholder="输入兑换码 BNS-XXXX-XXXX" maxlength="14" autocomplete="off" spellcheck="false">
<button class="code-submit-btn" onclick="redeemCode()">解锁</button>
</div>
<div class="code-msg" id="codeMsg"></div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>

    const d=await r.json();
    if(d.success&&d.license_key){
      localStorage.setItem(UNLOCK_KEY,d.license_key);isPaid=true;
      msg.className='code-msg success';msg.textContent='解锁成功！';
      updateFreeHint();renderStyleGrid();selectStyle(currentStyle);showToast('已解锁完整版！');
      setTimeout(()=>document.getElementById('codePanel').classList.remove('open'),1500);
    }else{msg.className='code-msg error';msg.textContent=d.message||'兑换失败'}
  }catch(e){msg.className='code-msg error';msg.textContent='网络错误，请重试'}
  btn.disabled=false;btn.textContent='解锁';
}
async function verifyStoredLicense(){
  const k=localStorage.getItem(UNLOCK_KEY);if(!k||k==='true')return false;
  try{const r=await fetch('/api/verify?key='+k);const d=await r.json();return d.valid===true}catch(e){return false}
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='codeInput'){e.preventDefault();redeemCode()}});

// ═══ INIT ═══
async function init(){
  const k=localStorage.getItem(UNLOCK_KEY);
  if(k&&k!=='true'){isPaid=await verifyStoredLicense();if(!isPaid)localStorage.removeItem(UNLOCK_KEY)}
  else{isPaid=false;if(k==='true')localStorage.removeItem(UNLOCK_KEY)}
  initShakeCount();saved=JSON.parse(localStorage.getItem(SAVED_KEY)||'[]');
  renderStyleGrid();selectStyle('minimal');buildSlots();shake();renderSaved();
}

function renderStyleGrid(){
  const g=document.getElementById('styleGrid');g.innerHTML='';
  Object.entries(STYLE_META).forEach(([k,s])=>{
    const isLocked=!isPaid&&!FREE_STYLES.includes(k);
    const c=document.createElement('div');
    c.className='style-card'+(isLocked?' locked-style':'');
    c.dataset.style=k;
    c.innerHTML=`<span class="style-icon">${s[1]}</span><span class="style-name">${s[0]}</span><span class="style-sample">${s[2]}</span>${isLocked?'<span class="lock-badge">🔒</span>':''}`;
    c.onclick=()=>{
      if(isLocked){showToast('解锁后可用');toggleUnlockPanel();return}
      selectStyle(k);
    };
    g.appendChild(c);
  });
}

function selectStyle(k){
  currentStyle=k;
  document.querySelectorAll('.style-card').forEach(c=>c.classList.toggle('selected',c.dataset.style===k));
  activeCats=new Set(Object.keys(CHAR_POOLS[k]));renderCats();updateSteps(2);
}

function renderCats(){
  const r=document.getElementById('catRow');r.innerHTML='';
  if(logicMode){r.innerHTML='<span style="font-size:11px;color:var(--muted)">有意义词模式下使用完整词库</span>';return}
  Object.keys(CHAR_POOLS[currentStyle]).forEach(cat=>{
    const b=document.createElement('button');b.className='cat-tag'+(activeCats.has(cat)?' active':'');b.textContent=cat;
    b.onclick=()=>{if(activeCats.has(cat)){if(activeCats.size<=1)return;activeCats.delete(cat);b.classList.remove('active')}else{activeCats.add(cat);b.classList.add('active')}};
    r.appendChild(b);
  });
}

function setLen(n){currentLen=n;document.querySelectorAll('.len-btn').forEach(b=>{const v=b.dataset.len;b.classList.toggle('active',v==n||v===String(n))});locked=[];buildSlots();shake()}
function toggleLogic(){logicMode=!logicMode;document.getElementById('logicToggle').classList.toggle('on',logicMode);document.getElementById('labelRandom').classList.toggle('active',!logicMode);document.getElementById('labelLogic').classList.toggle('active',logicMode);document.getElementById('modeHint').textContent=logicMode?'从预设词库中随机抽取完整的有意义品牌名':'从字库中随机抽字拼合，可能产生意外惊喜';document.getElementById('slotHint').textContent=logicMode?'每次摇出一个完整的有意义名字':'点击单字锁定';renderCats();buildSlots();shake()}

function buildSlots(){const a=document.getElementById('slotArea');a.innerHTML='';slots=[];const n=currentLen==='more'?(logicMode?7:5+Math.floor(Math.random()*4)):currentLen;locked=new Array(n).fill(false);for(let i=0;i<n;i++){const s=document.createElement('div');s.className='slot';s.innerHTML='<div class="lock-dot"></div><span class="slot-char">字</span>';if(!logicMode)s.onclick=(()=>{const idx=i;return()=>toggleLock(idx)})();a.appendChild(s);slots.push(s)}}
function rebuildSlotsForPhrase(n){const a=document.getElementById('slotArea');a.innerHTML='';slots=[];locked=new Array(n).fill(false);for(let i=0;i<n;i++){const s=document.createElement('div');s.className='slot';s.innerHTML='<div class="lock-dot"></div><span class="slot-char">字</span>';a.appendChild(s);slots.push(s)}}
function toggleLock(i){if(isSpinning||logicMode)return;locked[i]=!locked[i];slots[i].classList.toggle('locked',locked[i])}
function getCharPool(){const p=CHAR_POOLS[currentStyle];let pool=[];activeCats.forEach(c=>{if(p[c])pool=pool.concat(p[c])});return[...new Set(pool)]}
function R(a){return a[Math.floor(Math.random()*a.length)]}
function getPhrase(){const key=currentLen==='more'?'more':String(currentLen);const p=PHRASES[currentStyle]?.[key];if(!p||!p.length)return null;const hk=currentStyle+'_'+key;if(!phraseHistory[hk])phraseHistory[hk]=[];const h=phraseHistory[hk];const av=p.filter(x=>!h.includes(x));const pick=av.length>0?R(av):R(p);h.push(pick);if(h.length>Math.floor(p.length*0.7))h.shift();return pick}

function shake(){
  if(isSpinning)return;
  if(!checkCanShake())return;
  isSpinning=true;useShake();updateSteps(3);
  const btn=document.getElementById('shakeBtn');btn.style.pointerEvents='none';
  if(logicMode){
    const phrase=getPhrase();if(!phrase){isSpinning=false;btn.style.pointerEvents='auto';return}
    const chars=[...phrase];if(chars.length!==slots.length)rebuildSlotsForPhrase(chars.length);
    const pool=getCharPool();
    slots.forEach((s,i)=>{s._iv=setInterval(()=>{s.querySelector('.slot-char').textContent=pool.length>0?R(pool):R(chars)},45)});
    slots.forEach((s,i)=>{setTimeout(()=>{clearInterval(s._iv);s.querySelector('.slot-char').textContent=chars[i]||'?';const ch=s.querySelector('.slot-char');ch.style.transform='scale(1.2)';setTimeout(()=>ch.style.transform='scale(1)',100)},250+i*100)});
  }else{
    if(currentLen==='more'){const n=5+Math.floor(Math.random()*4);if(n!==slots.length){rebuildSlotsForPhrase(n);locked=new Array(n).fill(false)}}
    const pool=getCharPool();if(!pool.length){isSpinning=false;btn.style.pointerEvents='auto';return}
    slots.forEach((s,i)=>{if(!locked[i])s._iv=setInterval(()=>{s.querySelector('.slot-char').textContent=R(pool)},45)});
    slots.forEach((s,i)=>{if(!locked[i])setTimeout(()=>{clearInterval(s._iv);s.querySelector('.slot-char').textContent=R(pool);const ch=s.querySelector('.slot-char');ch.style.transform='scale(1.2)';setTimeout(()=>ch.style.transform='scale(1)',100)},250+i*100)});
  }
  setTimeout(()=>{isSpinning=false;btn.style.pointerEvents='auto'},250+slots.length*100+80);
}

function getCurrentWord(){return slots.map(s=>s.querySelector('.slot-char').textContent).join('')}
function saveWord(){const w=getCurrentWord(),sn=STYLE_META[currentStyle][0];if(saved.some(s=>s.word===w)){showToast('已收藏过了');return}saved.push({word:w,style:sn});localStorage.setItem(SAVED_KEY,JSON.stringify(saved));renderSaved();showToast('已收藏 '+w)}
function removeSaved(i){saved.splice(i,1);localStorage.setItem(SAVED_KEY,JSON.stringify(saved));renderSaved()}
function clearSaved(){if(!saved.length)return;saved=[];localStorage.setItem(SAVED_KEY,'[]');renderSaved();showToast('已清空')}
function copyAll(){if(!saved.length)return;const t=saved.map(s=>s.word).join(' / ');navigator.clipboard.writeText(t).then(()=>showToast('已复制到剪贴板')).catch(()=>{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已复制到剪贴板')})}
function renderSaved(){const l=document.getElementById('savedList');if(!saved.length){l.innerHTML='';return}l.innerHTML=saved.map((s,i)=>`<div class="saved-item"><span class="saved-word">${s.word}</span><span class="saved-style-tag">${s.style}</span><span class="remove-x" onclick="event.stopPropagation();removeSaved(${i})">×</span></div>`).join('')}
function updateSteps(n){[1,2,3].forEach(i=>document.getElementById('step'+i).classList.toggle('active',i<=n))}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();shake()}if(e.code==='Enter'){e.preventDefault();saveWord()}});
init();
</script>
</body></html>
